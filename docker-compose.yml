version: '3.9'

services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      - REDIS_HOST=172.26.148.182
      - REDIS_PORT=6379
      - REDIS_DB=0

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_HOST=172.26.148.182
      - MONGO_INITDB_PORT=27017
      - MONGO_INITDB_DATABASE=FilmFloodApi
    volumes:
      - mongodb_data:/data/db
    command: mongod --replSet rs0

  fastapi:
    build:
      context: ../backend-fastapi/
      dockerfile: Dockerfile
    container_name: fastapi
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mongodb
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=FilmFloodApi

  nestjs:
      build:
        context: ./backend-nestjs/
        dockerfile: Dockerfile
      container_name: nestjs
      ports:
      - "4200:4200"
      depends_on:
        - redis
        - mongodb
        - fastapi
      environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=FilmFloodApi  

  nextjs:
      build:
        context: ./frontend-nextjs/
        dockerfile: Dockerfile
      container_name: nextjs
      ports:
      - "3000:3000"
      depends_on:
        - redis
        - mongodb
        - fastapi
        - nextjs
      environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=FilmFloodApi      

volumes:
  mongodb_data:      
